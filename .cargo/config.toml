[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-Wl,-rpath,/Library/Developer/CommandLineTools/usr/lib/swift/macosx", "-C", "link-arg=-Wl,-rpath,/usr/lib/swift"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-Wl,-rpath,/Library/Developer/CommandLineTools/usr/lib/swift/macosx", "-C", "link-arg=-Wl,-rpath,/usr/lib/swift"]
