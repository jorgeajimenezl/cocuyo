[package]
name = "cocuyo"
version = "0.1.0"
edition = "2024"

[dependencies]
ash = "0.38"
ashpd = { version = "0.12.0", default-features = true, features = [ "pipewire", "wayland" ] }
drm-fourcc = "2.2"
gstreamer = "0.23"
gstreamer-allocators = { version = "0.23", features = ["v1_16"] }
gstreamer-app = "0.23"
gstreamer-video = "0.23"
iced = { version = "0.14", default-features = false, features = ["wgpu", "tokio", "wayland", "image", "advanced"] }
nix = { version = "0.29", features = ["fs", "mman"] }
pipewire = "0.8"
tokio = { version = "1.41", features = [ "rt-multi-thread", "macros" ] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
