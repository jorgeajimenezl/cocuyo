[package]
name = "cocuyo"
version = "0.1.0"
edition = "2024"

[dependencies]
ashpd = { version = "0.12.0", default-features = true, features = [ "pipewire", "wayland" ] }
eframe = "0.33.2"
egui = "0.33.2"
gstreamer = "0.23"
gstreamer-app = "0.23"
gstreamer-video = "0.23"
image = "0.25.9"
pipewire = "0.8"
tokio = { version = "1.41", features = [ "rt-multi-thread", "macros" ] }
