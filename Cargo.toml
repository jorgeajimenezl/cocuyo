[package]
name = "cocuyo"
version = "0.1.0"
edition = "2024"

[dependencies]
ash = "0.38"
ashpd = { version = "0.12.2", default-features = true, features = [ "pipewire", "wayland" ] }
drm-fourcc = "2.2"
gstreamer = "0.23"
gstreamer-allocators = { version = "0.23", features = ["v1_16"] }
gstreamer-app = "0.23"
gstreamer-video = "0.23"
iced = { git = "https://github.com/jorgeajimenezl/iced.git", rev = "70f48781c5af256b410adbc9b0da16121098e4e6", default-features = false, features = ["wgpu", "tokio", "wayland", "image", "advanced", "canvas"] }
nix = { version = "0.29", features = ["fs", "mman", "ioctl"] }
wgpu = "27"
wgpu-hal = { version = "27", features = ["vulkan"] }
pipewire = { version = "0.8", features = ["v0_3_77"] }
tokio = { version = "1.41", features = [ "rt-multi-thread", "macros" ] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytemuck = { version = "1.25.0", features = ["derive"] }
wiz-lights-rs = "0.2"
futures = "0.3.31"
serde = { version = "1.0.228", features = ["derive"] }
toml = "1.0.3"
dirs = "6.0.0"
