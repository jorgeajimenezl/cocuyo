  <circle cx="128" cy="120" r="96" fill="#ffffff" opacity="0.12"/>
  <g fill="#ffffff">
    <!-- Bulb glass -->
    <path d="M128 24c-39 0-68 28-68 66 0 27 15 43 27 58 8 11 11 19 11 30v4h60v-4c0-11 3-19 11-30 12-15 27-31 27-58 0-38-29-66-68-66zm0 16c30 0 52 22 52 50 0 21-12 33-23 47-9 12-13 22-14 33h-30c-1-11-5-21-14-33-11-14-23-26-23-47 0-28 22-50 52-50z"/>
    <!-- Base rings -->
    <rect x="92" y="194" width="72" height="16" rx="6"/>
    <rect x="100" y="216" width="56" height="14" rx="6"/>
    <!-- Tip -->
    <rect x="116" y="236" width="24" height="12" rx="6"/>
  </g>
</svg>
