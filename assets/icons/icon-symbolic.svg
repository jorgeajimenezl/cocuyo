<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!--
    Symbolic (monochrome) tray icon for Cocuyo.
    Pure white on transparent so the OS can tint it for light/dark themes
    (macOS template image, Windows tray theming).
  -->
