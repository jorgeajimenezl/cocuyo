name: Setup Build Environment
description: Install Rust toolchain, platform dependencies, and configure cargo cache

inputs:
  target:
    description: Rust target triple
    required: true

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.target }}

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libgstreamer-plugins-bad1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libpipewire-0.3-dev \
          libvulkan-dev \
          libwayland-dev \
          libxkbcommon-dev \
          libgtk-3-dev \
          libappindicator3-dev \
          libxdo-dev

    - name: Cache cargo registry & build
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ inputs.target }}-cargo-${{ hashFiles('Cargo.lock') }}
        restore-keys: ${{ inputs.target }}-cargo-
