name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: cocuyo-windows-x86_64
            binary: cocuyo.exe
            features: tray
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: cocuyo-linux-x86_64
            binary: cocuyo
            features: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cocuyo-macos-aarch64
            binary: cocuyo
            features: tray
          - os: macos-26-intel
            target: x86_64-apple-darwin
            artifact: cocuyo-macos-x86_64
            binary: cocuyo
            features: tray

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup
        with:
          target: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          cd staging && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          cd staging && 7z a ../${{ matrix.artifact }}.zip *

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          # Find OUT_DIR from build script output
          OUT_DIR=$(find target/${{ matrix.target }}/release/build/cocuyo-*/out -maxdepth 0 -type d 2>/dev/null | head -1)

          # Build .icns from pre-rendered PNGs
          ICONSET="cocuyo.iconset"
          mkdir -p "$ICONSET"
          cp "$OUT_DIR/icon-square-16.png"   "$ICONSET/icon_16x16.png"
          cp "$OUT_DIR/icon-square-32.png"   "$ICONSET/icon_16x16@2x.png"
          cp "$OUT_DIR/icon-square-32.png"   "$ICONSET/icon_32x32.png"
          cp "$OUT_DIR/icon-square-64.png"   "$ICONSET/icon_32x32@2x.png"
          cp "$OUT_DIR/icon-square-128.png"  "$ICONSET/icon_128x128.png"
          cp "$OUT_DIR/icon-square-256.png"  "$ICONSET/icon_128x128@2x.png"
          cp "$OUT_DIR/icon-square-256.png"  "$ICONSET/icon_256x256.png"
          cp "$OUT_DIR/icon-square-512.png"  "$ICONSET/icon_256x256@2x.png"
          cp "$OUT_DIR/icon-square-512.png"  "$ICONSET/icon_512x512.png"
          cp "$OUT_DIR/icon-square-1024.png" "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o cocuyo.icns

          APP="staging/Cocuyo.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} "$APP/MacOS/"
          sed "s/\${VERSION}/$VERSION/g" assets/macos/Info.plist > "$APP/Info.plist"
          cp cocuyo.icns "$APP/Resources/"
          cd staging && tar czf ../${{ matrix.artifact }}.tar.gz Cocuyo.app

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Cocuyo" \
            --window-size 600 400 \
            --icon "Cocuyo.app" 150 200 \
            --app-drop-link 450 200 \
            "${{ matrix.artifact }}.dmg" staging/Cocuyo.app

      - name: Attest build provenance (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.artifact }}.tar.gz

      - name: Attest build provenance (macOS DMG)
        if: runner.os == 'macOS'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.artifact }}.dmg

      - name: Attest build provenance (Windows)
        if: runner.os == 'Windows'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.artifact }}.zip

      - name: Upload release asset (Linux)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.artifact }}.tar.gz" --clobber

      - name: Upload release asset (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.artifact }}.zip" --clobber

      - name: Upload release asset (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.artifact }}.tar.gz" --clobber
          gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.artifact }}.dmg" --clobber
