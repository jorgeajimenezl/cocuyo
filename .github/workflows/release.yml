name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: cocuyo-windows-x86_64
            binary: cocuyo.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: cocuyo-linux-x86_64
            binary: cocuyo
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cocuyo-macos-aarch64
            binary: cocuyo
          - os: macos-26-intel
            target: x86_64-apple-darwin
            artifact: cocuyo-macos-x86_64
            binary: cocuyo

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup
        with:
          target: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          cd staging && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          cd staging && 7z a ../${{ matrix.artifact }}.zip *

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          cd staging && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Attest build provenance (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.artifact }}.tar.gz

      - name: Attest build provenance (Windows)
        if: runner.os == 'Windows'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.artifact }}.zip

      - name: Upload release asset (Linux)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.artifact }}.tar.gz" --clobber

      - name: Upload release asset (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.artifact }}.zip" --clobber

      - name: Upload release asset (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.artifact }}.tar.gz" --clobber
